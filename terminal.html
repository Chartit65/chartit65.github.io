<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WTI SHADOW TERMINAL</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; color: #007bff; height: 100%; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        .terminal-header { height: 70px; background: #0a0a0a; border-bottom: 2px solid #222; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .title { font-size: 1.6rem; font-weight: 900; letter-spacing: 3px; }
        .status { color: #00ff41; font-weight: bold; font-size: 0.9rem; text-align: right; }
        .exit { color: #444; text-decoration: none; font-size: 0.7rem; }
        
        /* THE CHART AREA */
        .chart-container { width: 100vw; height: calc(100vh - 70px); position: relative; background: #000; }
        svg { width: 100%; height: 100%; }
        
        .price-line { stroke: #222; stroke-width: 1; }
        .phantom-line { stroke: cyan; stroke-width: 2; stroke-dasharray: 8,8; }
        .phantom-text { fill: cyan; font-size: 18px; font-weight: bold; }
        .candle-up { fill: #00ff41; }
        .candle-down { fill: #ff4949; }
        .wick { stroke: #666; stroke-width: 1; }
        .axis-label { fill: #666; font-size: 12px; }
    </style>
</head>
<body>

    <div class="terminal-header">
        <div>
            <div class="title">WTI SHADOW TERMINAL</div>
            <a href="index.html" class="exit">← EXIT SESSION</a>
        </div>
        <div class="status">
            <div>● SHADOW FEED ACTIVE</div>
            <div style="color: #444; font-size: 0.7rem;">ENCRYPTED CONNECTION</div>
        </div>
    </div>

    <div class="chart-container">
        <svg viewBox="0 0 1000 600" preserveAspectRatio="none">
            <line x1="0" y1="100" x2="1000" y2="100" class="price-line" />
            <line x1="0" y1="200" x2="1000" y2="200" class="price-line" />
            <line x1="0" y1="300" x2="1000" y2="300" class="price-line" />
            <line x1="0" y1="400" x2="1000" y2="400" class="price-line" />
            <line x1="0" y1="500" x2="1000" y2="500" class="price-line" />

            <line x1="0" y1="120" x2="1000" y2="120" class="phantom-line" />
            <text x="820" y="110" class="phantom-text">PHANTOM TARGET: $112.50</text>
            <path d="M 850 80 L 860 100 L 870 80 Z" fill="cyan" /> <line x1="100" y1="250" x2="100" y2="350" class="wick" />
            <rect x="90" y="270" width="20" height="60" class="candle-up" />
            
            <line x1="250" y1="380" x2="250" y2="580" class="wick" /> <rect x="240" y="400" width="20" height="80" class="candle-down" />
            <text x="230" y="595" class="axis-label" style="fill:#00ff41;">$84.37 LOW</text>

            <line x1="550" y1="150" x2="550" y2="300" class="wick" />
            <rect x="540" y="160" width="20" height="120" class="candle-up" />

            <line x1="700" y1="125" x2="700" y2="200" class="wick" />
            <rect x="690" y="125" width="20" height="50" class="candle-up" />
            <text x="670" y="220" class="axis-label">THU CLOSE: $112.06</text>

            <rect x="800" y="0" width="200" height="600" fill="rgba(0,123,255,0.05)" />
            <text x="840" y="580" class="axis-label" style="fill:cyan;">SATURDAY SHADOW</text>
        </svg>
    </div>

</body>
</html>
