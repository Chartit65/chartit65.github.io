<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SYSTEM ONLINE: TRACKING SHADOW PRINTS</title>
    <style>
        body { 
            background-color: #000; 
            color: #00ff00; 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; 
            padding: 10px;
            overflow: hidden; /* Stops double scrolling */
        }
        .header { 
            height: 30px;
            margin-bottom: 10px; 
            font-size: 1.1em; 
            letter-spacing: 2px;
        }
        /* THIS IS THE FIX: Forced height and width */
        #chart_container_wrapper { 
            width: 100%; 
            height: calc(100vh - 60px); 
            border: 1px solid #333;
            background: #131722; /* TradingView's dark color */
        }
    </style>
</head>
<body>

    <div class="header">>> SYSTEM ONLINE: TRACKING SHADOW PRINTS</div>

    <div id="chart_container_wrapper">
        <div id="tradingview_chart" style="height: 100%; width: 100%;"></div>
    </div>

    <script type="text/javascript" src="s3.tradingview.com/tv.js"></script>
    
    <script type="text/javascript">
        new TradingView.widget({
            "autosize": true,
            "symbol": "NASDAQ:CXAI",
            "interval": "5",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "toolbar_bg": "#f1f3f6",
            "enable_publishing": false,
            "hide_side_toolbar": false,
            "allow_symbol_change": true,
            "container_id": "tradingview_chart"
        });
    </script>

</body>
</html>
