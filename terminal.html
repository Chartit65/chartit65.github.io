<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phantom Oil Monitor</title>
    <script src="cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: black; color: #00FF00; font-family: monospace; margin: 0; padding: 10px; overflow: hidden; }
        #header { border-bottom: 1px solid #f0f; color: #f0f; padding: 10px; margin-bottom: 15px; font-weight: bold; }
        .chart-wrapper { position: relative; height: 80vh; width: 98vw; }
    </style>
</head>
<body>
    <div id="header">PHANTOM PRINCE OIL MONITOR // PROTOCOL: ACTIVE</div>
    <div class="chart-wrapper">
        <canvas id="oilChart"></canvas>
    </div>

    <script>
        // This script is now INSIDE the HTML to ensure zero loading errors
        function renderChart() {
            if (typeof Chart === 'undefined') {
                setTimeout(renderChart, 500);
                return;
            }

            const ctx = document.getElementById('oilChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Thu (Cl)', 'Fri (Cl)', 'Sat (Phantom)', 'Sun (Today)', 'Mon (Open)'],
                    datasets: [
                        {
                            label: 'Official Market',
                            data: [111.54, 112.06, null, null, null],
                            borderColor: '#00FF00',
                            borderWidth: 4,
                            pointRadius: 6
                        },
                        {
                            label: 'Phantom Prints',
                            data: [111.54, 112.06, 112.15, 112.38, 112.55],
                            borderColor: '#f0f',
                            borderDash: [5, 5],
                            borderWidth: 2,
                            pointBackgroundColor: '#f0f',
                            pointRadius: 6,
                            spanGaps: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            grid: { color: '#222' },
                            ticks: { color: '#00FF00', font: { size: 14 } },
                            title: { display: true, text: 'WTI CRUDE PRICE (USD)', color: '#00FF00' },
                            min: 110,
                            max: 114
                        },
                        x: {
                            grid: { color: '#222' },
                            ticks: { color: '#00FF00' }
                        }
                    },
                    plugins: {
                        legend: { labels: { color: '#00FF00' } }
                    }
                }
            });
        }
        window.onload = renderChart;
    </script>
</body>
</html>
