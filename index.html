<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EngageMe.Live</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        .container {
            z-index: 2;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 0.2rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        p {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 30px;
        }

        /* The Classic Blue Button */
        .enter-button {
            background-color: #007bff;
            color: white;
            padding: 15px 40px;
            font-size: 1.2rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.4);
            font-weight: bold;
            text-transform: uppercase;
        }

        .enter-button:hover {
            background-color: #0056b3;
            box-shadow: 0 6px 20px rgba(0, 123, 255, 0.6);
            transform: translateY(-2px);
        }

        /* Subtle background glow */
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0,123,255,0.15) 0%, rgba(0,0,0,0) 70%);
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="container">
        <h1>ENGAGEME.LIVE</h1>
        <p>Advanced Market Intelligence & Astral Data</p>
        
        <button class="enter-button" onclick="alert('System Initializing...')">
            ENTER SYSTEM
        </button>
    </div>

</body>
</html>
