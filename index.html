<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENGAGEME ANALYTICS | TERMINAL_V.1.0</title>
    <style>
        /* Bloomberg & HFT Palette */
        :root {
            --bloomberg-black: #000000;
            --bloomberg-amber: #ffb400; /* Standard Terminal Amber */
            --bloomberg-blue: #0068ff;
            --bloomberg-green: #00ff88;
            --text-main: #e0e0e0;
            --border: #222;
        }

        body {
            background-color: var(--bloomberg-black);
            color: var(--text-main);
            /* Monospace font gives it the "Machine" feel */
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Top Status Bar */
        .status-bar {
            background: #111;
            border-bottom: 1px solid var(--border);
            padding: 8px 20px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            color: var(--bloomberg-amber);
        }

        /* Main Terminal Container */
        .main-view {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .terminal-box {
            border: 2px solid var(--border);
            padding: 40px;
            max-width: 800px;
            background: #050505;
            position: relative;
        }

        /* The Header Gradient (Bloomberg Style) */
        .header {
            border-left: 4px solid var(--bloomberg-amber);
            padding-left: 20px;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            color: var(--bloomberg-amber);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .sub-title {
            color: var(--bloomberg-blue);
            font-weight: bold;
            margin-top: 5px;
        }

        .data-stream {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-main);
            margin-bottom: 30px;
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }

        .cmd-line {
            color: var(--bloomberg-green);
            font-weight: bold;
        }

        /* Footer / Contact */
