<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        /* Background Glow for that 'Elite' feel */
        .glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 104, 255, 0.07) 0%, transparent 70%);
            z-index: 0;
        }
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 5rem;
            border-radius: 24px;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            max-width: 700px;
        }
        .status-badge {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            background: rgba(0, 255, 204, 0.1);
            border: 1px solid rgba(0, 255, 204, 0.3);
            border-radius: 50px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2.5rem;
            color: #00ffcc;
            font-weight: bold;
        }
        h1 {
            font-size: 3.5rem;
            letter-spacing: -2px;
            margin: 0 0 1rem 0;
            background: linear-gradient(to bottom right, #ffffff, #666666);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: #888;
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 3rem;
        }
        .terminal-line {
            font-family: 'Courier New', Courier, monospace;
            color: #555;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .contact-btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: transparent;
            border: 1px solid #fff;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .contact-btn:hover {
            background: #fff;
            color: #000;
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="container">
        <div class="status-badge">Phase 1: Systems Staging</div>
        <h1>ENGAGEME_ANALYTICS</h1>

        <div class="terminal-line">
            [SYS_LOG]: MONITORING_TAPE // CALCULATING_GRAVITY_ZONES...

</body>
</html>
