<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHANTOM PRINCE | WTI HUB</title>
    <style>
        body { 
            background: #000; color: #00FF41; font-family: 'Courier New', monospace; 
            margin: 0; height: 100vh; overflow: hidden; text-transform: uppercase;
        }
        /* PAGE 1: THE GATE */
        #portal {
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 100vh; width: 100%; position: absolute; z-index: 100; background: #000;
        }
        .enter-btn { 
            border: 2px solid #00FF41; padding: 25px 50px; color: #00FF41; 
            font-size: 1.8em; cursor: pointer; background: #000; transition: 0.3s;
            letter-spacing: 5px; font-weight: bold;
        }
        .enter-btn:hover { background: #00FF41; color: #000; box-shadow: 0 0 30px #00FF41; }

        /* PAGE 2: THE HUB */
        #hub {
            display: none; flex-direction: column; height: 100vh; width: 100%;
        }
        header { height: 60px; border-bottom: 2px solid #00FF41; text-align: center; line-height: 60px; font-size: 20px; font-weight: bold; }
        
        /* THE FIX: HARD HEIGHT */
        #wti-chart { 
            height: calc(100vh - 160px); /* Forces the chart to take up the middle 80% */
            background: #000; 
            width: 100%;
        }
        
        .footer-ticker { height: 100px; border-top: 2px solid #00FF41; background: #050505; display: flex; justify-content: space-around; align-items: center; }
        .data-row { font-size: 14px; font-weight: bold; }
        .pink { color: #FF00FF; }
    </style>
</head>
<body>

    <div id="portal">
        <h1 style="letter-spacing: 15px; font-size: 45px; margin-bottom: 10px;">PHANTOM PRINCE</h1>
        <p style="color: #444; margin-bottom: 50px; letter-spacing: 2px;">WTI CRUDE PROTOCOL // 1965</p>
        <button class="enter-btn" onclick="openSystem()">ENTER TERMINAL</button>
    </div>

    <div id="hub">
        <header>SYS: PHANTOM PRINCE // ACTIVE MONITOR</header>
        
        <div id="wti-chart">
            </div>

        <div class="footer-ticker">
            <div class="data-row">THU: 112.06</div>
            <div class="data-row">FRI: 112.25</div>
            <div class="data-row pink">SUN PRINT: 112.65</div>
        </div>
    </div>

    <script type="text/javascript" src="s3.tradingview.com/tv.js"></script>
    <script>
        function openSystem() {
            document.getElementById('portal').style.display = 'none';
            document.getElementById('hub').style.display = 'flex';

            // We use a slight delay to let the browser draw the container before we fill it
            setTimeout(function() {
                new TradingView.widget({
                    "width": "100%",
                    "height": "100%",
                    "symbol": "TVC:USOIL",
                    "interval": "60",
                    "timezone": "Etc/UTC",
                    "theme": "dark",
                    "style": "1",
                    "locale": "en",
                    "toolbar_bg": "#f1f3f6",
                    "enable_publishing": false,
                    "hide_side_toolbar": false,
                    "allow_symbol_change": true,
                    "container_id": "wti-chart"
                });
            }, 50);
        }
    </script>
</body>
</html>
