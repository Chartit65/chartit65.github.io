<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>engagement.live | WTI Shadow Terminal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; color: #fff; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        .page-section { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        #landing { display: flex; }
        #oil-terminal { display: none; padding: 10px; background: #050505; }
        
        /* Branding */
        h1 { font-size: 3rem; margin-bottom: 20px; font-family: sans-serif; }
        h1 span { color: #007bff; }
        .cta-button { background: #007bff; color: #fff; padding: 15px 40px; border-radius: 4px; cursor: pointer; font-weight: bold; font-family: sans-serif; }

        /* Terminal UI */
        .terminal-header { width: 100%; border-bottom: 1px solid #333; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .back-btn { color: #666; cursor: pointer; font-size: 0.8rem; }
        
        .main-display { display: flex; width: 100%; height: calc(100vh - 80px); gap: 10px; padding: 10px; }
        
        /* The Shadow Print Margin Label */
        #shadow-margin-label {
            position: absolute;
            left: 0;
            background: rgba(0, 123, 255, 0.9);
            color: white;
            padding: 4px 8px;
            font-size: 10px;
            z-index: 100;
            border-radius: 0 4px 4px 0;
            font-weight: bold;
            pointer-events: none;
        }

        .chart-box { flex: 3; background: #111; position: relative; border: 1px solid #222; }
        .stats-sidebar { flex: 1; background: #0a0a0a; border: 1px solid #222; padding: 15px; text-align: left; }
        
        .shadow-line {
            position: absolute;
            width: 100%;
            height: 1px;
            background: #007bff; /* The Razor-Thin Blue Line */
            z-index: 99;
            box-shadow: 0 0 5px #007bff;
        }

        .stat-row { margin-bottom: 15px; border-left: 2px solid #007bff; padding-left: 10px; }
        .stat-label { font-size: 0.7rem; color: #555; text-transform: uppercase; }
        .stat-value { font-size: 1.2rem; color: #00ff00; }
    </style>
</head>
<body>

    <section id="landing" class="page-section">
        <h1>engage me<span>.live</span></h1>
        <div class="cta-button" onclick="openTerminal()">Access WTI Shadow Terminal</div>
    </section>

    <section id="oil-terminal">
        <div class="terminal-header">
            <div><span style="color:#007bff">WTI</span> SHADOW_v1.0</div>
            <div class="back-btn" onclick="location.reload()">[ EXIT_SYSTEM ]</div>
        </div>

        <div class="main-display">
            <div class="chart-box" id="chart-container">
                <div id="shadow-margin-label">SHADOW<br>PRINT</div>
                <div id="shadow-price-line" class="shadow-line"></div>
                
                <div id="tradingview_main" style="height:100%; width:100%"></div>
            </div>

            <div class="stats-sidebar">
                <div class="stat-row">
                    <div class="stat-label">Shadow Print Price</div>
                    <div id="display-shadow-price" class="stat-value">CALCULATING...</div>
                </div>
                <div class="stat-row">
                    <div class="stat-label">Variance (Grey vs CME)</div>
                    <div id="display-variance" class="stat-value" style="color: #007bff;">+0.00%</div>
                </div>
                <div class="stat-row">
                    <div class="stat-label">Source Priority</div>
                    <div class="stat-value" style="font-size: 0.8rem; color: #888;">INTERBANK / DARK POOL</div>
                </div>
            </div>
        </div>
    </section>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        function openTerminal() {
            document.getElementById('landing').style.display = 'none';
            document.getElementById('oil-terminal').style.display = 'block';
            loadChart();
            startShadowEngine();
        }

        function loadChart() {
            new TradingView.widget({
                "autosize": true,
                "symbol": "TVC:USOIL",
                "interval": "1",
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "container_id": "tradingview_main"
            });
        }

        function startShadowEngine() {
            // Shadow Print Logic: Simulating Interbank/Gray Market Feed
            setInterval(() => {
                const basePrice = 85.40; // This would normally be your API hook
                const shadowFlux = (Math.random() * 0.50).toFixed(2);
                const shadowPrice = (parseFloat(basePrice) + parseFloat(shadowFlux)).toFixed(2);
                
                // Update UI elements
                document.getElementById('display-shadow-price').innerText = `$${shadowPrice}`;
                
                // Position the Blue Shadow Line & Label (Visual Simulation)
                const line = document.getElementById('shadow-price-line');
                const label = document.getElementById('shadow-margin-label');
                const topPos = 150 + (Math.random() * 100); // Dynamic placement for demonstration
                
                line.style.top = `${topPos}px`;
                label.style.top = `${topPos - 15}px`;
            }, 3000);
        }
    </script>
</body>
</html>
