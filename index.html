<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Terminal V3.2 | Handshake Fixed</title>
    <style>
        body { background-color: #0a0a0a; color: #00ff00; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        #header { height: 50px; background: #111; border-bottom: 2px solid #333; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; }
        #chart-container { height: calc(100vh - 50px); width: 100%; }
        input { background: #000; border: 1px solid #00ff00; color: #00ff00; padding: 5px; text-transform: uppercase; }
        button { background: #00ff00; color: #000; border: none; padding: 5px 15px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="header">
    <div>SYSTEM STATUS: ONLINE // BYPASS ENABLED</div>
    <div class="controls">
        <input type="text" id="tickerInput" placeholder="ENTER TICKER">
        <button id="syncBtn">SYNC DATA & CHART</button>
    </div>
</div>
<div id="chart-container"></div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>

<script>
    // PASTE YOUR LATEST GOOGLE URL BETWEEN THE QUOTES BELOW
    const googleUrl = "https://script.google.com/macros/s/AKfycbwcWhXEgq_o7vNiRn09YKxsJCe4QNYPtEs0IU1zX6RB_R3ELJKF7kFUYsKza8mHz1hU/exec";

    let tvWidget = null;

    function drawChart(symbol, floor, ceiling) {
        document.getElementById("chart-container").innerHTML = "";
        
        tvWidget = new TradingView.widget({
            "autosize": true,
            "symbol": symbol,
            "interval": "1",
            "theme": "dark",
            "container_id": "chart-container",
            "extended_hours": true,
            "timezone": "Etc/UTC"
        });

        // This replaces the broken 'onChartReady' function
        setTimeout(() => {
            try {
                if (floor > 0) {
                    tvWidget.chart().createShape({
                        price: floor, shape: 'horizontal_line', lock: true,
                        overrides: { linecolor: '#00ff00', linewidth: 3, showLabel: true, text: "FLOOR: " + floor }
                    });
                }
                if (ceiling > 0) {
                    tvWidget.chart().createShape({
                        price: ceiling, shape: 'horizontal_line', lock: true,
                        overrides: { linecolor: '#ff00ff', linewidth: 2, showLabel: true, text: "CEILING: " + ceiling }
                    });
                }
            } catch (e) { 
                console.log("Waiting for chart to stabilize..."); 
            }
        }, 2000); // 2-second wait to ensure the chart is fully loaded
    }

    async function sync() {
        const t = document.getElementById('tickerInput').value.toUpperCase().trim();
        if (!t) return;

        try {
            const res = await fetch(googleUrl);
            const data = await res.json();

            if (data[t]) {
                drawChart(t, parseFloat(data[t].floor), parseFloat(data[t].ceiling));
            } else {
                alert("TICKER NOT FOUND. ADDING TO SHEET...");
                fetch(googleUrl + "?add=" + t, { mode: 'no-cors' });
                setTimeout(() => sync(), 4000); // Wait 4 seconds for Google to write the row
            }
        } catch (e) {
            console.error("Sync Error:", e);
            drawChart(t, 0, 0); // Load basic chart even if Google fails
        }
    }

    document.getElementById('syncBtn').onclick = sync;
    window.onload = () => drawChart("PRCH", 0, 0);
</script>
</body>
</html>
