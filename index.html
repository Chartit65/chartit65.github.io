<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENGAGEME.LIVE | SYSTEM ENTRY</title>
    <style>
        body {
            background-color: #000;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .terminal-header {
            margin-bottom: 30px;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* THE BLUE BUTTON STYLE */
        .enter-button {
            background-color: #0044ff;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            box-shadow: 0 0 15px rgba(0, 68, 255, 0.6);
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .enter-button:hover {
            background-color: #0022aa;
            box-shadow: 0 0 25px rgba(0, 68, 255, 0.9);
            transform: scale(1.05);
        }

        .footer-text {
            margin-top: 20px;
            font-size: 0.8rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="terminal-header">
        <h1>ENGAGEME.LIVE</h1>
        <p>>> STATUS: SYSTEM READY</p>
    </div>

    <a href="terminal.html" class="enter-button">
        ENTER SYSTEM
    </a>

    <div class="footer-text">
        SECURE CONNECTION ESTABLISHED
    </div>

</body>
</html>
