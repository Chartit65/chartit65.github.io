<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WTI SHADOW TERMINAL | AUTO-SCALE</title>
    <script type="text/javascript" src="s3.tradingview.com/tv.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Courier New', Courier, monospace; overflow: hidden; height: 100vh; width: 100vw; }
        #main-container { display: flex; height: 100%; width: 100%; }
        
        /* FLEXIBLE CHART ZONE */
        #chart-zone { flex: 1; position: relative; height: 100%; background: #000; }
        
        /* SHADOW OVERLAYS (Invisible to Mouse) */
        #shadow-line { 
            position: absolute; left: 0; width: 100%; height: 2px; 
            background: #007bff; z-index: 999; box-shadow: 0 0 15px #007bff; 
            pointer-events: none; 
        }
        #shadow-tag { 
            position: absolute; left: 15px; background: #007bff; color: white; 
            padding: 4px 10px; font-size: 13px; font-weight: bold; z-index: 1000; 
            border-radius: 2px; pointer-events: none;
        }

        /* DATA SIDEBAR */
        #sidebar { width: 280px; background: #050505; border-left: 1px solid #222; padding: 30px 15px; z-index: 1001; }
        .data-box { border-left: 3px solid #007bff; padding-left: 15px; margin-bottom: 30px; }
        .label { font-size: 10px; color: #555; letter-spacing: 1px; }
        .value { font-size: 2.4rem; font-weight: bold; color: #00ff00; font-family: monospace; }
    </style>
</head>
<body>

    <div id="main-container">
        <div id="chart-zone">
            <div id="shadow-line" style="top: 50%;"></div>
            <div id="shadow-tag" style="top: calc(50% - 25px);">SHADOW_PRINT</div>
            
            <div id="tradingview_v13" style="height: 100%; width: 100%;"></div>
        </div>

        <div id="sidebar">
            <div class="data-box">
                <div class="label">WTI CRUDE</div>
                <div id="price-val" class="value">111.85</div>
                <div style="font-size: 11px; color: #007bff; margin-top: 8px;">● V13_AUTO_SCALE</div>
            </div>
            <div style="font-size: 10px; color: #333; margin-top: auto;">NYMEX_CL1!_FEED</div>
        </div>
    </div>

    <script>
        // Use the same flexible widget logic as the main site
        new TradingView.widget({
            "autosize": true,
            "symbol": "NYMEX:CL1!",
            "interval": "60",
            "timezone": "America/New_York",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "toolbar_bg": "#f1f3f6",
            "enable_publishing": false,
            "withdateranges": true,
            "hide_side_toolbar": false,
            "allow_symbol_change": true,
            "container_id": "tradingview_v13",
            "show_popup_button": true,
            "popup_width": "1000",
            "popup_height": "650",
            "details": true,
            "hotlist": true,
            "calendar": true
        });

        // Shadow Bouncer Logic
        let p = 111.85;
        const line = document.getElementById('shadow-line');
        const tag = document.getElementById('shadow-tag');
        const val = document.getElementById('price-val');

        setInterval(() => {
            p = (parseFloat(p) + (Math.random() - 0.5) * 0.07).toFixed(2);
            val.innerText = p;
            
            // Keeps the shadow line bouncing in the "middle" view
            let y = (window.innerHeight / 2) + (Math.random() * 80 - 40);
            line.style.top = y + 'px';
            tag.style.top = (y - 30) + 'px';
        }, 2500);
    </script>
</body>
</html>
