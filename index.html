<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHANTOM PRINCE | TERMINAL</title>
    <style>
        body { background: #000; color: #00FF41; font-family: monospace; margin: 0; height: 100vh; overflow: hidden; text-transform: uppercase; }
        
        /* THE SPLASH OVERLAY */
        #splash { 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 100vh; width: 100%; position: absolute; top: 0; left: 0; z-index: 100; background: #000; 
        }
        
        /* THE TERMINAL HUB (Behind the splash) */
        #terminal { 
            display: flex; flex-direction: column; height: 100vh; width: 100%; position: relative; z-index: 10;
        }

        .enter-btn { border: 2px solid #00FF41; padding: 20px 40px; color: #00FF41; font-size: 24px; cursor: pointer; background: transparent; font-weight: bold; }
        header { padding: 15px; border-bottom: 2px solid #00FF41; text-align: center; }
        .chart-box { flex-grow: 1; width: 100%; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        footer { padding: 15px; border-top: 2px solid #00FF41; display: flex; justify-content: space-around; background: #050505; font-size: 12px; }
        .pink { color: #FF00FF; }
    </style>
</head>
<body>

    <div id="splash">
        <h1 style="letter-spacing: 10px;">PHANTOM PRINCE</h1>
        <p style="color: #444; margin-bottom: 30px;">WTI CRUDE PROTOCOL</p>
        <button class="enter-btn" onclick="document.getElementById('splash').style.display='none';">ENTER TERMINAL</button>
    </div>

    <div id="terminal">
        <header>SYS: PHANTOM PRINCE // ACTIVE MONITOR</header>
        <div class="chart-box">
            <iframe src="www.tradingview-widget.com/embed-widget/advanced-chart/?symbol=TVC%3AUSOIL&interval=60&theme=dark&style=1&timezone=Etc%2FUTC&locale=en" allowfullscreen></iframe>
        </div>
        <footer>
            <div>THU: 112.06</div>
            <div>FRI: 112.25</div>
            <div class="pink">SUN PRINT: 112.65</div>
        </footer>
    </div>

</body>
</html>
