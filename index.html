<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENGAGEME ANALYTICS | LIQUIDITY SYSTEMS</title>
    <style>
        body {
            background-color: #030303;
            color: #ffffff;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh; /* Changed from height to min-height */
            margin: 0;
            padding: 20px; /* Safety padding */
        }
        .glow {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(28, 66, 122, 0.1) 0%, transparent 65%);
            z-index: 0;
        }
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 4rem 2rem;
            border-radius: 4px;
            /* Removed backdrop-filter for better compatibility */
            background: #0a0a0a; 
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
            max-width: 600px;
            width: 100%;
        }
        .status-badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 2.5rem;
            color: #888;
        }
        h1 {
            font-size: 3rem;
            letter-spacing: 1px;
            margin: 0 0 1.2rem 0;
            font-weight: 800;
            text-transform: uppercase;
            /* The "Hot E" Streamlined Silver Gradient */
            background: linear-gradient(to right, #ffffff 0%, #ffffff 10%, #aaaaaa 40%, #666666 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: #666;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 3rem;
            font-weight: 300;
        }
        .contact-btn {
            display: inline-block;
            padding: 1.1rem 2.8rem;
            background: #ffffff;
            color: #000;
            text-decoration: none;
            font-weight: 800;
            font-size: 0.8rem;
            border-radius: 2px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: opacity 0.2s;
        }
        .contact-btn:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="container">
        <div class="status-badge">Phase 1: Development</div>
        <h1>ENGAGEME ANALYTICS</h1>
        <p>Architecting institutional-grade HFT engines for real-time liquidity dynamics and proprietary equity dilution analysis.</p>
        <a href="mailto:info@novamulti.com" class="contact-btn">Request Access</a>
    </div>
</body>
</html>
