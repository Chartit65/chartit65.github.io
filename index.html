<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENGAGEME.LIVE | TERMINAL</title>
    <style>
        body, html { margin: 0; padding: 0; background: #050505; color: #00ff41; font-family: monospace; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .header { height: 35px; border-bottom: 2px solid #00ff41; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; font-size: 0.8rem; background: #000; }
        #container { flex-grow: 1; position: relative; background: #000; }
        .log { height: 160px; border-top: 2px solid #00ff41; padding: 10px; font-size: 0.85rem; background: #000; overflow-y: auto; }
        .line { border-left: 3px solid #00ff41; padding-left: 10px; margin-bottom: 8px; }
        .fuchsia { color: #f0f; border-color: #f0f !important; }
        .blink { animation: b 1.5s infinite; }
        @keyframes b { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="header">
        <span>SYS: PHANTOM PRINCE | SECURE</span>
        <span id="t"></span>
    </div>

    <div id="container">
        <iframe src="s.tradingview.com/widgetembed/?symbol=TVC:USOIL&interval=1&theme=dark&style=1" style="width:100%; height:100%; border:none;"></iframe>
    </div>

    <div class="log">
        <div class="line"><span style="color:#fff">THU: 112.06 [CLOSE]</span></div>
        <div class="line"><span style="color:#fff">FRI: 112.25 [SETTLE]</span></div>
        <div class="line fuchsia"><span style="color:#f0f">SUN: 112.65 [SUN PRINT]</span></div>
        <div class="line"><span class="blink">LIVE: 113.15 [MONITORING BREAKOUT]</span></div>
    </div>

    <script>
        function s(){ document.getElementById('t').innerHTML = new Date().toLocaleTimeString(); setTimeout(s,1000); }
        s();
    </script>
</body>
</html>
