<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EngageMe Live</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { 
            background-color: #000000; 
            color: #ffffff; 
            font-family: Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        .btn { 
            background-color: #28a745; 
            color: white; 
            padding: 15px 30px; 
            font-size: 1.2rem; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            display: none; /* Button stays hidden until browser says it is 100% ready */
        }
    </style>
</head>
<body>

    <h1>EngageMe Live</h1>
    <p>Real-time networking for the world.</p>

    <button id="installBtn" class="btn">Add App Shortcut</button>

    <script>
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');

        // Only shows the button when the browser is ready to show the official "Install" window
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block'; 
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
                if (outcome === 'accepted') {
                    installBtn.style.display = 'none';
                }
            }
        });

        // This registers the "Engine" (sw.js)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
